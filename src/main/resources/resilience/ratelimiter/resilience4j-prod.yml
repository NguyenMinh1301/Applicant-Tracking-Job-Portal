resilience4j:
  ratelimiter:
    instances:
      # Auth
      authStrict:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true
      authModerate:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # OTP
      otpSend:
        limitForPeriod: 3
        limitRefreshPeriod: 300s
        timeoutDuration: 0
        registerHealthIndicator: true
      otpVerify:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true

      # Webhook
      webhookInbound:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true

      # OpenAPI
      swagger:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # Base
      lowTraffic:
        limitForPeriod: 15
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      mediumTraffic:
        limitForPeriod: 45
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      highTraffic:
        limitForPeriod: 75
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # AI / OpenAI
      openaiApi:
        limitForPeriod: 50
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # JD Generator (gpt-4o, higher cost — stricter in prod than dev)
      jdGenerator:
        limitForPeriod: 5
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true

      # Admin endpoints
      adminGeneral:
        limitForPeriod: 60
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true